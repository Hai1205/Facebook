services:
  backend:
    build:
      context: ./backend
      dockerfile: backend/Dockerfile
    container_name: backend
    ports:
      - "4040:4040"
    env_file:
      - ./backend/backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
